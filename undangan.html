<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Vania & Rayhan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Playfair Display', serif; background:#f8f1eb; text-align:center; color:#5a4634; }
.overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#fff; display:flex; flex-direction:column;
  justify-content:center; align-items:center; z-index:999;
}
.open-btn {
  padding:15px 30px; background:#b48b7d; color:white; border:none; border-radius:10px; cursor:pointer;
}
.hidden { display:none; }
header { padding:80px 20px; }
h1 { font-family:'Great Vibes', cursive; font-size:60px; color:#b48b7d; }
.section { padding:50px 20px; }
video { width:80%; max-width:600px; border-radius:15px; }
.card { background:white; padding:20px; border-radius:15px; display:inline-block; margin:10px; }
button { padding:12px 20px; border:none; border-radius:10px; background:#b48b7d; color:white; cursor:pointer; }
input, textarea { padding:10px; margin:8px; border-radius:10px; border:1px solid #ccc; width:250px; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <h2>Undangan Lamaran</h2>
  <h1>Vania & Rayhan</h1>
  <button class="open-btn" onclick="openInvite()">Buka Undangan</button>
</div>

<audio id="music" loop>
  <source src="musik.mp3" type="audio/mp3">
</audio>

<div id="content" class="hidden">
<header>
  <h1>Vania & Rayhan</h1>
  <p>16 Mei 2026 | 10.00 WIB</p>
</header>

<div class="section">
  <h2>Video Undangan</h2>
  <video controls>
    <source src="undangan.mp4" type="video/mp4">
  </video>
</div>

<div class="section">
  <h2>Countdown</h2>
  <div id="countdown"></div>
</div>

<div class="section">
  <h2>Lokasi</h2>
  <a href="https://maps.app.goo.gl/bh2j27xzQwxYXxb9A" target="_blank">
    <button>Lihat Lokasi</button>
  </a>
</div>

<div class="section">
  <h2>RSVP</h2>
  <form id="rsvpForm">
    <input type="text" id="nama" placeholder="Nama" required><br>
    <textarea id="pesan" placeholder="Ucapan"></textarea><br>
    <button type="submit">Kirim</button>
  </form>
  <p id="respon"></p>
</div>
</div>

<script>
function openInvite(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('music').play();
}

const targetDate = new Date("May 16, 2026 10:00:00").getTime();
setInterval(()=>{
  const now = new Date().getTime();
  const d = targetDate - now;
  const days = Math.floor(d/(1000*60*60*24));
  const h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((d%(1000*60*60))/(1000*60));
  const s = Math.floor((d%(1000*60))/1000);
  document.getElementById('countdown').innerHTML = `${days} hari ${h} jam ${m} menit ${s} detik`;
},1000);

// GOOGLE SHEETS INTEGRATION
const scriptURL = 'PASTE_URL_WEB_APP_GOOGLE_SHEETS_DISINI';
const form = document.getElementById('rsvpForm');

form.addEventListener('submit', e => {
  e.preventDefault();
  fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(response => {
      document.getElementById('respon').innerText = 'Terima kasih sudah konfirmasi ❤️';
      form.reset();
    })
    .catch(error => console.error('Error!', error.message));
});
</script>

</body>
</html>
